definitions:
  go-admin_server_internal_model.Device:
    properties:
      createT:
        type: integer
      deviceNo:
        type: string
      id:
        type: integer
      ip:
        type: string
      merchantId:
        type: string
      status:
        type: integer
    type: object
  go-admin_server_internal_service.RegisterDevicePayload:
    properties:
      deviceNo:
        type: string
      merchantId:
        type: string
    required:
    - deviceNo
    - merchantId
    type: object
  internal_handler.errorSwaggerResponse:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  internal_handler.registerDeviceSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/go-admin_server_internal_model.Device'
      message:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/open/devices:
    post:
      consumes:
      - application/json
      description: |-
        向 device 表插入一条设备记录。

        请求头鉴权说明：
        - X-API-Key: 开放接口访问标识
        - X-Timestamp: 秒级 Unix 时间戳
        - X-Nonce: 每次请求唯一随机串
        - X-Signature: 按 apiKey\ntimestamp\nnonce\nMETHOD\n/path\nsha256(body)\nsecret 规则生成的 SHA256 签名

        业务说明：
        - deviceNo 重复时禁止注册
      parameters:
      - description: 开放接口访问标识
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: 秒级 Unix 时间戳
        in: header
        name: X-Timestamp
        required: true
        type: string
      - description: 请求唯一随机串
        in: header
        name: X-Nonce
        required: true
        type: string
      - description: SHA256 签名值
        in: header
        name: X-Signature
        required: true
        type: string
      - description: 设备注册请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-admin_server_internal_service.RegisterDevicePayload'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/internal_handler.registerDeviceSwaggerResponse'
        "400":
          description: 参数错误或设备号重复
          schema:
            $ref: '#/definitions/internal_handler.errorSwaggerResponse'
        "401":
          description: 鉴权失败
          schema:
            $ref: '#/definitions/internal_handler.errorSwaggerResponse'
      summary: 设备注册
      tags:
      - 开放设备接口
swagger: "2.0"
